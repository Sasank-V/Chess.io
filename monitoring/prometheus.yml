global:
  scrape_interval: 5s

scrape_configs:
  - job_name: api-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - dev:3000

  - job_name: ws-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - dev:8080

  - job_name: persistence-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - dev:4000
